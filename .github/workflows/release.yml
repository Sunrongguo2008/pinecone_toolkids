name: Build & Release

# 推送 v 开头的标签(如 v0.1.1)时自动编译并发布 Release；也可在 Actions 页手动触发。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # 允许创建 Release / 上传附件

jobs:
  build:
    runs-on: windows-latest   # WinForms 必须在 Windows 上编译
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: 发布（自包含 / 单文件 / 压缩 / x64）
        run: >
          dotnet publish src/Toolkids/Toolkids.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o dist

      - name: 重命名产物
        shell: pwsh
        run: Copy-Item dist/Toolkids.exe "Toolkids-${{ github.ref_name }}-win-x64.exe"

      - name: 上传构建产物（可在 Actions 运行页下载）
        uses: actions/upload-artifact@v4
        with:
          name: Toolkids-${{ github.ref_name }}
          path: Toolkids-${{ github.ref_name }}-win-x64.exe

      - name: 创建 Release（仅打标签时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Toolkids-${{ github.ref_name }}-win-x64.exe
          generate_release_notes: true
